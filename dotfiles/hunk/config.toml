theme = "graphite"   # graphite, midnight, paper, ember
mode = "auto"        # auto, split, stack
exclude_untracked = false
line_numbers = true
wrap_lines = true
agent_notes = true

[keys]
toggle_sidebar = "alt+m"
scroll_top = "g"
scroll_bottom = "shift+g"
prev_hunk = ["["]
next_hunk = ["]"]
prev_comment = "{"
next_comment = "}"

[colors]
addedContentBg = "#2a5a2a"
removedContentBg = "#5a2a2a"

