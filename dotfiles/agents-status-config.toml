[notification]
# notify-macos is on PATH via ~/dotfiles_scripts/notify/
# Requires: brew install vjeantet/tap/alerter
command = "notify-macos"

[post-event]
commands = [
    "$AGENTS_STATUS_DIR/../tmux/scripts/refresh_dim_colors.sh",
    "/opt/homebrew/bin/python3.14 $HOME/agents-status/statusbar/run.py",
]

[statusbar]
workspaces_provider = "aerospace"
bar = "sketchybar"

[statusbar.sketchybar]
label_template = "{app_icons} {agent_icon} {monitor_icon} {tmux_sessions}"

[statusbar.sketchybar.colors]
default_bg_focused = "0xffcba6f7"
default_bg_unfocused = "0xff23243e"
default_text_focused = "0xff1e1e1e"
default_text_unfocused = "0xffa287c5"
