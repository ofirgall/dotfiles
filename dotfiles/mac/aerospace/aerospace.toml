config-version = 2

start-at-login = true
auto-reload-config = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

accordion-padding = 0

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

# SketchyBar integration — only trigger the two affected workspaces
exec-on-workspace-change = ['/bin/bash', '-c',
    '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change_$AEROSPACE_PREV_WORKSPACE FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE --trigger aerospace_workspace_change_$AEROSPACE_FOCUSED_WORKSPACE FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

key-mapping.preset = 'qwerty'

gaps.inner.horizontal = 0
gaps.inner.vertical =   0
gaps.outer.left =       0
gaps.outer.bottom =     0
gaps.outer.top =        0
gaps.outer.right =      0

[mode.main.binding]

# Focus (Super+hjkl)
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'

# Move/swap windows (Super+Shift+hjkl)
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# Workspaces (Super+1-9)
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# Move window to workspace (Super+Shift+1-9) — refresh sketchybar + agents-status names
cmd-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 1']
cmd-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 2']
cmd-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 3']
cmd-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 4']
cmd-shift-5 = ['move-node-to-workspace 5', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 5']
cmd-shift-6 = ['move-node-to-workspace 6', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 6']
cmd-shift-7 = ['move-node-to-workspace 7', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 7']
cmd-shift-8 = ['move-node-to-workspace 8', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 8']
cmd-shift-9 = ['move-node-to-workspace 9', 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/refresh-workspaces.sh 9']

# Open terminal (Super+Enter)
cmd-enter = "exec-and-forget osascript -e 'tell application \"Ghostty\" to new window'"

# Open browser (Super+b)
cmd-b = 'exec-and-forget /usr/bin/open -na "Google Chrome" --args --new-window'

# Close window (Super+q)
# Aerospace's `close` doesn't work for Ghostty, so we check the focused app
# and send Cmd+W for Ghostty, otherwise use native aerospace close.
cmd-q = '''exec-and-forget APP=$(aerospace list-windows --focused --format '%{app-bundle-id}') && \
    if [ "$APP" = "com.mitchellh.ghostty" ]; then \
        osascript -e 'tell application "System Events" to keystroke "w" using command down'; \
    else \
        aerospace close --quit-if-last-window; \
    fi; \
    sleep 0.2 && sketchybar --trigger window_count_change'''

# Fullscreen/Monocle toggle (Super+f) — uses accordion with 0 padding for true monocle
cmd-f = ['layout tiles accordion', 'exec-and-forget sketchybar --trigger window_count_change']

# Maximize toggle (Super+m / Super+z)
cmd-m = ['layout tiles accordion', 'exec-and-forget sketchybar --trigger window_count_change']
cmd-z = ['layout tiles accordion', 'exec-and-forget sketchybar --trigger window_count_change']

# Prev/next workspace (Super+, / Super+.)
cmd-comma = 'workspace prev'
cmd-period = 'workspace next'

# Last workspace (Super+`)
cmd-backtick = 'workspace-back-and-forth'

# Move window to other monitor and follow focus (Super+o)
cmd-o = ['move-node-to-monitor --wrap-around next', 'focus-monitor --wrap-around next']

# Layout toggle
cmd-slash = 'layout tiles horizontal vertical'

# Resize (Super+Ctrl+h/l)
cmd-ctrl-h = 'resize width -50'
cmd-ctrl-l = 'resize width +50'

# Screenshot (Super+s) — macOS interactive screenshot
cmd-s = 'exec-and-forget screencapture -i ~/Desktop/screenshot-$(date +%Y%m%d-%H%M%S).png'

# Clipboard history (Alt+v) — Raycast
alt-v = 'exec-and-forget open raycast://extensions/raycast/clipboard-history/clipboard-history'

# Float toggle (Super+Shift+f -- matches Hyprland Ctrl+F)
cmd-shift-f = 'layout floating tiling'

# Alt+Tab: cycle windows in workspace (preserves fullscreen)
f19 = 'exec-and-forget ~/dotfiles/dotfiles/mac/aerospace/cycle-window.sh'

# Reload aerospace + sketchybar (Super+Shift+r)
cmd-shift-r = ['reload-config', 'exec-and-forget sketchybar --reload; sleep 0.5; /opt/homebrew/bin/python3.14 /Users/ofirgal/agents-status/statusbar/run.py']

# Service mode (Super+Shift+;)
cmd-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

[[on-window-detected]]
if.during-aerospace-startup = true
run = []

[[on-window-detected]]
if = 'true'
run = 'exec-and-forget sketchybar --trigger window_count_change'
