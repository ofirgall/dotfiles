workspace_roots = [
    "~/workspace/personal",
    "~/workspace/work",
]
default_shell = "zsh"
plugin_timeout = 30
default_select_by = "repo"
name_builder_modes = [
    "full_name",
    "build_from_parts",
    "git_hub_pr",
    "jira_url",
]
on_enter = "tmux"
on_create = "tmux"
default_sort = "lru"
copy_cursor_conversations = true

[selector]
backend = "fzf"

[keybinds]
new_session = "alt-n"
delete_session = "alt-d"
rename_session = "alt-r"
view_tree = "ctrl-t"
view_workspace = "ctrl-w"
view_repo = "ctrl-e"
view_owner = "ctrl-o"
view_label = "ctrl-g"
edit_labels = "alt-l"
cd_session = "ctrl-d"
new_bare_session = "alt-N"
sort_toggle = "ctrl-s"
session_from_dirty = "alt-s"

[plugins]
enabled = [
    "git-worktree",
    "tmux",
    "cursor-mcp-auth",
    "cursor-mcp-approvals",
    "cursor-trusted-workspace",
]

[plugin_settings]

[[session_name_stages]]
name = "prefix"
kind = "choice"
choices = [
    "feat",
    "fix",
    "chore",
]

[[session_name_stages]]
name = "ticket-prefix"
kind = "choice"
choices = ["DR"]

[[session_name_stages]]
name = "ticket-number"
kind = "text"
choices = []
