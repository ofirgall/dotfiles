- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - ["test -d $HOME/agents-status || git clone git@github.com:KoalaVim/agents-status.git $HOME/agents-status", Cloning agents-status]
    - [$HOME/agents-status/install.sh core, Installing agents-status core]
    - [$HOME/agents-status/install.sh hooks claude, Installing agents-status claude hooks]
    - [$HOME/agents-status/install.sh hooks cursor, Installing agents-status cursor hooks]
    - [$HOME/agents-status/install.sh hooks codex, Installing agents-status codex hooks]
    - [$HOME/agents-status/install.sh wrapper codex, Installing agents-status codex wrapper]
    - [$HOME/agents-status/install.sh wrapper cursor, Installing agents-status cursor wrapper]

- defaults:
    link:
      relink: true
      force: true
      create: true

- link:
    ~/.zshrc:
        path: dotfiles/zsh-conf/entrypoint.zsh
    ~/.zshenv:
        path: dotfiles/zsh-conf/env.zsh
    ~/.zsh-conf:
        path: dotfiles/zsh-conf
    ~/.my-zsh-conf:
        path: dotfiles/my-zsh-conf
    ~/.profile:
        path: dotfiles/profile
    ~/.gitconfig:
        path: dotfiles/gitconfig
    ~/.gitignore_global:
        path: dotfiles/gitignore_global
    ~/.ripgreprc:
        path: dotfiles/ripgreprc
    ~/.tmux.conf:
        path: dotfiles/tmux_conf/entrypoint.tmux
    ~/.tmux_conf:
        path: dotfiles/tmux_conf
    ~/.tmux/custom-macros:
        path: dotfiles/tmux_conf/custom-macros
    ~/dotfiles_scripts:
        path: scripts
    ~/.config/nvim:
        path: editors/KoalaConfig
    ~/.config/kvim-envs/main:
        path: editors/KoalaConfig
    ~/.vimrc:
        path: dotfiles/vimrc
    ~/playgrounds:
        path: playgrounds
    ~/.kvim.conf:
        path: dotfiles/.kvim.conf
    ~/.config/yazi:
        path: dotfiles/yazi
    ~/.config/hunk:
        path: dotfiles/hunk
    ~/.config/lumen:
        path: dotfiles/lumen
    ~/.claude/settings.json:
        path: dotfiles/claude/settings.json
    ~/.cursor/statusline.sh:
        path: dotfiles/cursor/statusline.sh
    ~/.config/agents-status/config.toml:
        path: dotfiles/agents-status-config.toml
    ~/.config/cursor-cli-wrapper/config.toml:
        path: dotfiles/cursor-cli-wrapper.toml
    ~/.config/gh-dash/config.yml:
        path: dotfiles/gh-dash/config.yml

- create:
    - ~/projects
    - ~/workspace

- shell:
    - [install_scripts/install_zsh.sh, Installing ZSH]
    - [install_scripts/install_basic.sh, Running basic libs installation]
    - [install_scripts/install_tuis.sh, Installing TUIs]
    - [install_scripts/install_dap.sh, Installing DAP bins]
    - [install_scripts/install_nvim.sh, Installing Neovim]
    - [install_scripts/install_tmux.sh, Installing tmux]
    - [install_scripts/install_go.sh, Installing Go]
    - [install_scripts/install_wrappers.sh, Installing Wrappers]
    - [install_scripts/install_git_utils.sh, Installing Git utilities]
