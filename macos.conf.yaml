- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [install_scripts/mac/install_brew.sh, Installing Homebrew]
    - [install_scripts/mac/install_basic.sh, Installing basic dependencies]
    - [install_scripts/mac/install_karabiner.sh, Installing Karabiner-Elements]
    - [install_scripts/mac/install_fonts.sh, Installing Nerd Fonts]
    - [install_scripts/mac/install_tmux.sh, Installing tmux]
    - [install_scripts/mac/install_ghostty.sh, Installing Ghostty]
    - [install_scripts/mac/install_kvim.sh, Installing KoalaVim]
    - [install_scripts/mac/install_ez_workspaces.sh, Installing ez-workspaces]

- defaults:
    link:
      relink: true
      force: true
      create: true

- link:
    ~/.zshrc:
        path: dotfiles/zsh-conf/entrypoint.zsh
    ~/.zshenv:
        path: dotfiles/zsh-conf/env.zsh
    ~/.zsh-conf:
        path: dotfiles/zsh-conf
    ~/.my-zsh-conf:
        path: dotfiles/my-zsh-conf
    ~/.tmux.conf:
        path: dotfiles/tmux_conf/entrypoint.tmux
    ~/.tmux_conf:
        path: dotfiles/tmux_conf
    ~/.tmux/custom-macros:
        path: dotfiles/tmux_conf/custom-macros
    ~/.config/karabiner/karabiner.json:
        path: dotfiles/mac/karabiner/karabiner.json
    ~/.config/nvim:
        path: editors/KoalaConfig
    ~/.kvim.conf:
        path: dotfiles/.kvim.conf
    ~/dotfiles_scripts:
        path: scripts
    ~/.config/ghostty:
        path: dotfiles/ghostty
    ~/Library/Application Support/ez/config.toml:
        path: dotfiles/ez-workspaces-macos/config.toml

- create:
    - ~/workspace/personal
    - ~/workspace/work
