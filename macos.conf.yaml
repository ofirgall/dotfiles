- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [install_scripts/mac/install_brew.sh, Installing Homebrew]
    - [install_scripts/mac/install_basic.sh, Installing basic dependencies]
    - [install_scripts/mac/install_ghostty.sh, Installing Ghostty]

- defaults:
    link:
      relink: true
      force: true
      create: true

- link:
    ~/.zshrc:
        path: dotfiles/zsh-conf/entrypoint.zsh
    ~/.zshenv:
        path: dotfiles/zsh-conf/env.zsh
    ~/.zsh-conf:
        path: dotfiles/zsh-conf
    ~/.my-zsh-conf:
        path: dotfiles/my-zsh-conf
    ~/.config/ghostty:
        path: dotfiles/ghostty
