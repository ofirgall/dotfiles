- shell:
    - [git submodule update --init --recursive, Installing submodules]


- defaults:
    link:
      relink: true
      force: true
      create: true

- link:
    # ~/.config/sublime-text/Packages/User:
    #     path: editors/sublime/User
    # ~/.config/sublime-text/Packages/C++:
    #     path: editors/sublime/C++
    # ~/.config/sublime-text/Packages/Python:
    #     path: editors/sublime/Python
    # ~/.config/sublime-text/Packages/CustomStatusBar:
    #     path: editors/sublime/CustomStatusBar
    ~/.vscode-settings:
        path: editors/vscode-settings
    ~/.config/Code/User/settings.json:
        path: ~/.vscode-settings/settings.json
    ~/.config/Code/User/keybindings.json:
        path: ~/.vscode-settings/keybindings.json
    ~/.config/fusuma/config.yml:
        path: dotfiles/fusuma.yml
    ~/.alacritty.toml:
        path: dotfiles/alacritty.toml
    ~/alacritty-fonts:
        path: dotfiles/alacritty-fonts
    ~/.taskrc:
        path: dotfiles/taskrc
    ~/.taskwarrior_shortcuts:
        path: taskwarrior_shortcuts
    ~/.xmodmaprc:
        path: dotfiles/xmodmaprc
    ~/.config/awesome:
        path: awesomewm
    ~/.config/hypr:
        path: hypr-dots/hypr
    ~/.config/waybar:
        path: hypr-dots/waybar
    ~/.config/swaync:
        path: hypr-dots/swaync
    ~/.config/rofi:
        path: hypr-dots/rofi
    ~/.config/autorandr:
        path: dotfiles/autorandr
    ~/.config/copyq/copyq.conf:
        path: dotfiles/copyq.conf
    ~/.tridactylrc:
        path: dotfiles/tridactylrc
    ~/.config/systemd/user:
        path: services
    ~/.config/cursor-cli-wrapper/config.toml:
        path: dotfiles/cursor-cli-wrapper.toml
    ~/.config/openbox/autostart:
        path: dotfiles/openbox/autostart
    ~/.config/openbox/rc.xml:
        path: dotfiles/openbox/rc.xml
    ~/.config/ftdv/config.yaml:
        path: dotfiles/ftdv/config.yaml
    ~/.config/ghostty:
        path: dotfiles/ghostty
    ~/.config/ez/config.toml:
        path: dotfiles/ez-workspaces/config.toml
    ~/.config/vdesk-collapser/config.toml:
        path: dotfiles/vdesk-collapser/config.toml
    ~/.local/share/applications/gh-markdown-preview.desktop:
        path: desktop-apps/gh-markdown-preview.desktop
    ~/.local/share/applications/hypr-browser.desktop:
        path: desktop-apps/hypr-browser.desktop

- shell:
    # - [install_scripts/install_sublime.sh, Installing Sublime Text/Merge]
    - [install_scripts/install_vscode.sh, Installing vscode]
    - [editors/vscode-settings/install_extensions.sh, Installing vscode extensions]
    # - [install_scripts/install_fusuma.sh, Installing Fusuma]
    # - [install_scripts/install_taskwarrior.sh, Installing Task Warrior]
    - [install_scripts/install_fonts.sh, Installing nerd fonts]
    # - [install_scripts/firefox_from_deb.sh, Installing firefox from deb]
    - [install_scripts/install_spotify.sh, Installing spotify]
    - [awesomewm/install_awesomewm.sh, Installing awesome]
    - [ln -sf config.linux dotfiles/ghostty/config.platform, Setting Ghostty platform config]
    - [install_scripts/install_ghostty_plugins.sh, Installing ghostty plugins]
    - [install_scripts/xdg_defaults.sh, Setting xdg defaults]
